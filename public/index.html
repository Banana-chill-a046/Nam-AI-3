<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nam AI - Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root { 
            --bg-dark: #0e0e10; 
            --bg-input: #1e1f20; 
            --user-bubble: #2b2d2f; 
            --text-main: #e3e3e3; 
            --accent: #4e92ff; 
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            letter-spacing: -0.02em;
        }
        
        @keyframes neon-party {
            0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
            20% { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
            40% { color: #0000ff; text-shadow: 0 0 15px #0000ff; }
            60% { color: #ffff00; text-shadow: 0 0 15px #ffff00; }
            80% { color: #ff00ff; text-shadow: 0 0 15px #ff00ff; }
            100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        }

        .neon-title { 
            font-size: 42px; 
            font-weight: 600; 
            animation: neon-party 1.5s linear infinite; 
            text-align: center;
            max-width: 80%;
            line-height: 1.2;
        }

        #chat { flex: 1; overflow-y: auto; padding: 20px 10%; scroll-behavior: smooth; }
        
        .msg-wrapper { display: flex; flex-direction: column; margin-bottom: 30px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-name { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #fff; }
        .user-wrapper { align-items: flex-end; }
        .ai-wrapper { align-items: flex-start; }

        .message { 
            padding: 12px 20px; 
            border-radius: 18px; 
            font-size: 16px; 
            line-height: 1.6; 
            max-width: 85%; 
            word-wrap: break-word;
        }
        .user-wrapper .message { background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .ai-wrapper .message { background: transparent; padding-left: 0; color: #e3e3e3; }

        .file-chip { 
            display: none; 
            background: #2b2d2f; 
            border: 1px solid #3c4043; 
            border-radius: 12px; 
            padding: 12px 16px; 
            margin-bottom: 12px; 
            width: fit-content; 
        }
        .fc-name { font-size: 14px; font-weight: 600; color: #fff; }

        .input-area { padding: 10px 10% 30px; }
        .input-box-outer { 
            background: var(--bg-input); 
            border-radius: 30px; 
            padding: 10px 22px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
        }
        textarea { 
            flex: 1; 
            background: transparent; 
            border: none; 
            outline: none; 
            color: white; 
            font-size: 16px; 
            font-family: inherit; 
            resize: none; 
        }
        .btn-icon { background: transparent; border: none; color: #9aa0a6; cursor: pointer; font-size: 22px; }
        #header-name { padding: 20px; font-weight: 600; color: var(--accent); position: absolute; }
    </style>
</head>
<body>

    <div id="header-name">Nam AI</div>

    <div id="main-wrapper" style="flex:1; display:flex; flex-direction:column; max-width:900px; margin:0 auto; width:100%;">
        
        <div id="start-screen" style="flex:1; display:flex; justify-content:center; align-items:center;">
            <div class="neon-title">Chào bạn,<br>bạn cần giúp gì?</div>
        </div>

        <div id="chat-container" style="display:none; flex:1; flex-direction:column; overflow:hidden;">
            <div id="chat"></div>
        </div>

        <div class="input-area">
            <div id="file-chip" class="file-chip">
                <span id="fc-name" class="fc-name"></span>
            </div>
            <div class="input-box-outer">
                <button class="btn-icon" onclick="document.getElementById('file-input').click()">+</button>
                <textarea id="user-input" placeholder="Nhập yêu cầu..." rows="1"></textarea>
                <button id="send-btn" class="btn-icon" onclick="send()" style="color:var(--accent)">➤</button>
            </div>
        </div>

        <input type="file" id="file-input" style="display:none;" accept="image/*">
    </div>

    <script>
        let isChatting = false;
        const fileInput = document.getElementById('file-input');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        fileInput.addEventListener('change', () => {
            if (fileInput.files[0]) {
                document.getElementById('fc-name').innerText = fileInput.files[0].name;
                document.getElementById('file-chip').style.display = 'block';
            }
        });

        async function send() {
            const text = userInput.value.trim();
            const file = fileInput.files[0];
            if (!text && !file) return;

            sendBtn.disabled = true;
            if (!isChatting) {
                isChatting = true;
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
            }

            addMessage(text, 'user', file?.name);
            
            let base64 = null;
            if (file) {
                base64 = await new Promise(r => {
                    const reader = new FileReader();
                    reader.onload = () => r(reader.result);
                    reader.readAsDataURL(file);
                });
            }

            userInput.value = "";
            userInput.style.height = 'auto';
            document.getElementById('file-chip').style.display = 'none';
            fileInput.value = "";

            const loaderId = showLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, imageBase64: base64 })
                });
                
                const data = await response.json();
                document.getElementById(loaderId).remove();
                
                if (data.reply) {
                    addMessage(data.reply, 'ai');
                } else {
                    addMessage("Lỗi hệ thống: " + (data.error || "Không xác định"), 'ai');
                }
            } catch (e) {
                document.getElementById(loaderId).innerText = "Lỗi kết nối Server.";
            } finally {
                sendBtn.disabled = false;
            }
        }

        function addMessage(text, type, fileName) {
            const chat = document.getElementById('chat');
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${type === 'user' ? 'user-wrapper' : 'ai-wrapper'}`;
            
            wrapper.innerHTML = `
                <div class="msg-name">${type === 'user' ? 'Bạn' : 'Nam AI'}</div>
                <div class="message">
                    ${fileName ? `<div style="background:#1a1a1b; padding:8px; border-radius:8px; margin-bottom:8px; border:1px solid #333; font-size:12px">📁 ${fileName}</div>` : ''}
                    <span class="txt"></span>
                </div>
            `;
            chat.appendChild(wrapper);
            const txtSpan = wrapper.querySelector('.txt');

            if (type === 'ai') {
                let i = 0;
                function typing() {
                    if (i < text.length) { 
                        txtSpan.innerHTML += text.charAt(i++); 
                        chat.scrollTop = chat.scrollHeight; 
                        setTimeout(typing, 5); 
                    }
                }
                typing();
            } else { 
                txtSpan.innerText = text; 
            }
            chat.scrollTop = chat.scrollHeight;
        }

        function showLoading() {
            const id = "L" + Date.now();
            const loader = document.createElement('div');
            loader.className = "msg-wrapper ai-wrapper";
            loader.id = id;
            loader.innerHTML = `<div class="msg-name">Nam AI</div><div class="message" style="color:#666;">Đang xử lý...</div>`;
            document.getElementById('chat').appendChild(loader);
            document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
            return id;
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
        });
    </script>
</body>
</html>
